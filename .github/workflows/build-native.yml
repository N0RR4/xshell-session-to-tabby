name: Build Windows Native Exe

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download GraalVM
        run: |
          $url = "https://github.com/graalvm/graalvm-ce-builds/releases/download/jdk-21.0.2/graalvm-community-jdk-21.0.2_windows-x64_bin.zip"
          Write-Host "Downloading from: $url"
          Invoke-WebRequest -Uri $url -OutFile graalvm.zip
          $size = (Get-Item graalvm.zip).Length
          Write-Host "Downloaded size: $size bytes"
          if ($size -lt 1000000) {
            Write-Host "File too small, might be error page"
            Get-Content graalvm.zip | Select-Object -First 5
          }

      - name: Extract GraalVM
        run: |
          Write-Host "Extracting to C:\..."
          Expand-Archive -Path graalvm.zip -DestinationPath C:\ -Force
          $items = Get-ChildItem C:\graalvm* -ErrorAction SilentlyContinue
          Write-Host "Items found after extract:"
          $items | ForEach-Object { Write-Host $_.FullName }
          if ($items.Count -eq 0) {
            Write-Host "ERROR: No graalvm directory found!"
            Get-ChildItem C:\ | Select-Object -First 10
          }
          $gdir = $items[0].FullName
          Add-Content -Path $env:GITHUB_ENV -Value "GRAALVM_DIR=$gdir"
          Write-Host "GRAALVM_DIR set to: $gdir"

      - name: Install native-image
        run: |
          Write-Host "GRAALVM_DIR=$env:GRAALVM_DIR"
          $guPath = Join-Path $env:GRAALVM_DIR "bin\gu.cmd"
          Write-Host "gu.cmd path: $guPath"
          Write-Host "Exists: $(Test-Path $guPath)"
          Get-ChildItem "$env:GRAALVM_DIR\bin" | Select-Object Name | Format-Table -HideTableHeaders
          & $guPath install native-image --no-verify

      - name: Build JAR
        run: mvn package -DskipTests -q

      - name: Build Native Image
        run: |
          & "$env:GRAALVM_DIR\bin\native-image.cmd" -cp target/xshell-session-to-tabby.jar -H:Name=xshell-session-to-tabby --no-fallback -H:ConfigurationFileDirectories=src/main/resources/native/agent-output com.coffee.Main
        shell: cmd

      - name: Upload exe
        uses: actions/upload-artifact@v4
        with:
          name: xshell-session-to-tabby-exe
          path: xshell-session-to-tabby.exe
