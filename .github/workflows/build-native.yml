name: Build Windows Native Exe

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download GraalVM
        run: |
          $url = "https://github.com/graalvm/graalvm-ce-builds/releases/download/jdk-23.0.0/graalvm-community-jdk-23.0.0_windows-x64_bin.zip"
          curl -L -o graalvm.zip $url

      - name: Extract GraalVM
        run: |
          Expand-Archive -Path graalvm.zip -DestinationPath C:\ -Force
          Remove-Item graalvm.zip
          $gdir = (Get-ChildItem C:\graalvm* | Select-Object -First 1).FullName
          echo "GRAALVM_HOME=$gdir" | Out-File -FilePath $env:GITHUB_ENV -Append
          echo "GRAALVM_DIR=$gdir" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Install native-image
        run: |
          & "$env:GRAALVM_DIR\bin\gu.cmd" install native-image --no-verify

      - name: Build JAR
        run: mvn package -DskipTests -q

      - name: Build Native Image
        run: |
          & "$env:GRAALVM_DIR\bin\native-image.cmd" -cp target/xshell-session-to-tabby.jar -H:Name=xshell-session-to-tabby --no-fallback -H:ConfigurationFileDirectories=src/main/resources/native/agent-output com.coffee.Main
        shell: cmd

      - name: Upload exe
        uses: actions/upload-artifact@v4
        with:
          name: xshell-session-to-tabby-exe
          path: xshell-session-to-tabby.exe
