name: Build Windows Native Exe

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install GraalVM with native-image
        uses: graalvm/setup-graalvm@v1
        with:
          version: '21.0.2'
          distribution: 'native-image'

      - name: Verify GraalVM
        run: |
          Write-Host "GRAALVM_HOME: $env:GRAALVM_HOME"
          & gu version
          & native-image --version

      - name: Build JAR
        run: mvn package -DskipTests -q

      - name: Build Native Image
        run: |
          native-image -cp target/xshell-session-to-tabby.jar -H:Name=xshell-session-to-tabby --no-fallback -H:ConfigurationFileDirectories=src/main/resources/native/agent-output com.coffee.Main
        shell: cmd

      - name: Upload exe
        uses: actions/upload-artifact@v4
        with:
          name: xshell-session-to-tabby-exe
          path: xshell-session-to-tabby.exe
